<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>termcast — TikTok OAuth callback</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background:#111216; color:#eee;
           display:flex; min-height:100vh; margin:0; align-items:center; justify-content:center; }
    .card { max-width:640px; width:90%; background:#1b1c22; border-radius:16px; padding:32px; }
    h1 { font-size:20px; margin:0 0 16px; }
    .label { color:#25f4ee; font-size:12px; letter-spacing:.05em; text-transform:uppercase; margin-top:16px; }
    code { display:block; background:#000; padding:14px; border-radius:8px; word-break:break-all;
           font-size:14px; margin-top:6px; }
    button { margin-top:8px; background:#fe2c55; color:#fff; border:0; border-radius:8px;
             padding:10px 16px; font-size:14px; cursor:pointer; }
    .muted { color:#888; font-size:13px; margin-top:20px; }
    .err { color:#fe2c55; }
  </style>
</head>
<body>
  <div class="card">
    <h1>TikTok 認証コールバック</h1>
    <div id="content">読み込み中…</div>
    <p class="muted">この <b>code</b> をコピーして、ターミナルの認証スクリプトに貼り付けてください。code は数分で失効します。</p>
  </div>
  <script>
    const q = new URLSearchParams(location.search);
    const code = q.get('code');
    const state = q.get('state');
    const error = q.get('error');
    const el = document.getElementById('content');
    if (error) {
      el.innerHTML = '<p class="err">エラー: ' + error + ' — ' + (q.get('error_description')||'') + '</p>';
    } else if (code) {
      el.innerHTML =
        '<div class="label">Authorization code</div><code id="code">' + code + '</code>' +
        '<button onclick="navigator.clipboard.writeText(document.getElementById(\'code\').textContent)">code をコピー</button>' +
        (state ? '<div class="label">state</div><code>' + state + '</code>' : '');
    } else {
      el.innerHTML = '<p class="muted">code パラメータがありません。認証フローから遷移してください。</p>';
    }
  </script>
</body>
</html>
